# SPDX-License-Identifier: MIT
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      # Engine + scan-core both publish their public types via dist/. The
      # plugin imports both, so its typecheck can't resolve the packages
      # until those dists exist. Build them first.
      - name: Build engine
        run: pnpm --filter @hellomavens/security-review-for-salesforce-engine build

      - name: Build scan-core
        run: pnpm --filter @hellomavens/security-review-for-salesforce-scan-core build

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Tests with coverage
        run: pnpm test:coverage

      - name: License compliance
        run: npx --yes license-checker-rseidelsohn --production --excludePackages "sbs-audit-engine" --onlyAllow "MIT;Apache-2.0;BSD-2-Clause;BSD-3-Clause;ISC;CC0-1.0;CC-BY-4.0;CC-BY-SA-4.0;Unlicense;0BSD;Python-2.0;BlueOak-1.0.0"

  reuse-lint:
    name: REUSE compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: fsfe/reuse-action@v5

  secret-scan:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Use the gitleaks CLI directly rather than gitleaks-action@v2 — the
      # action tries to scan a commit RANGE that's broken on first-push to
      # main (no previous commit). Direct full-repo scan is bulletproof.
      - name: Install gitleaks
        run: |
          set -euxo pipefail
          VERSION=8.21.2
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks

      - name: Scan repo
        run: gitleaks detect --source . --no-banner --redact -v --exit-code 1

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - run: semgrep ci --config=auto

  actionlint:
    name: Actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: reviewdog/action-actionlint@v1
        with:
          fail_level: error
          reporter: github-pr-check

  markdownlint:
    name: Markdownlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v18
        with:
          globs: |
            **/*.md
            !node_modules/**
            !**/CHANGELOG.md
